name: Analytics Auditor PoC

on: 
  workflow_dispatch: 

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Compile Debug APK
        run: gradle assembleDebug

      - name: Install Network Proxy and Prepare Certificate
        run: |
          sudo apt-get update
          sudo apt-get install mitmproxy -y

          # Start mitmdump in background to generate certificates
          mitmdump --quiet &
          # Wait until the certificate file appears (timeout after 10s)
          timeout 10 bash -c 'while [ ! -f ~/.mitmproxy/mitmproxy-ca-cert.pem ]; do sleep 1; done'
          # Kill the background process
          pkill mitmdump || true

          # Debug: list the directory
          echo "Contents of ~/.mitmproxy:"
          ls -la ~/.mitmproxy/ || echo "Directory not found"

          # Ensure the certificate exists
          if [ ! -f ~/.mitmproxy/mitmproxy-ca-cert.pem ]; then
            echo "ERROR: Certificate file not generated!"
            exit 1
          fi

          # Calculate hash and copy to workspace
          HASH=$(openssl x509 -inform PEM -subject_hash_old -in ~/.mitmproxy/mitmproxy-ca-cert.pem | head -1)
          cp ~/.mitmproxy/mitmproxy-ca-cert.pem ./$HASH.0

          # Verify the file was created in the workspace
          echo "Certificate file in workspace:"
          ls -la *.0

      - name: Boot Emulator and Run Audit
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -http-proxy http://127.0.0.1:8080
          script: |
            echo "Gaining admin root access to phone..."
            adb root
            
            echo "Creating a writable system certificate layer..."
            adb shell "mkdir -p /data/local/tmp/cacerts && cp /system/etc/security/cacerts/* /data/local/tmp/cacerts/"
            adb shell "mount -t tmpfs tmpfs /system/etc/security/cacerts"
            adb shell "cp /data/local/tmp/cacerts/* /system/etc/security/cacerts/"
            
            echo "Injecting mitmproxy certificate into system trust store..."
            ls -la *.0 || echo "No .0 file found"
            
            CERT_FILE=$(ls *.0 | head -n 1)
            if [ -z "$CERT_FILE" ]; then
              echo "ERROR: No certificate file (.0) found!"
              exit 1
            fi
            echo "Using certificate file: $CERT_FILE"
            adb push "$CERT_FILE" /system/etc/security/cacerts/
            adb shell "chmod 644 /system/etc/security/cacerts/$CERT_FILE"
            adb shell "chown root:root /system/etc/security/cacerts/$CERT_FILE"
            
            echo "Writing HAR converter script..."
            cat > har_dump.py << 'EOF'
            from mitmproxy import ctx
            from mitmproxy.net.http.http1 import assemble
            import json, base64, os, datetime

            flows = []

            def request(flow):
                flows.append(flow)

            def done():
                har = {"log": {"version": "1.2", "creator": {"name": "mitmproxy", "version": "8.1.1"}, "entries": []}}
                for f in flows:
                    if f.response is None:
                        continue
                    entry = {
                        "startedDateTime": datetime.datetime.utcnow().isoformat() + "Z",
                        "time": 0,
                        "request": {
                            "method": f.request.method,
                            "url": f.request.pretty_url,
                            "httpVersion": "HTTP/1.1",
                            "cookies": [],
                            "headers": [{"name": k, "value": v} for k, v in f.request.headers.items()],
                            "queryString": [],
                            "headersSize": -1,
                            "bodySize": len(f.request.content or b"")
                        },
                        "response": {
                            "status": f.response.status_code,
                            "statusText": f.response.reason or "",
                            "httpVersion": "HTTP/1.1",
                            "cookies": [],
                            "headers": [{"name": k, "value": v} for k, v in f.response.headers.items()],
                            "content": {
                                "size": len(f.response.content or b""),
                                "mimeType": f.response.headers.get("content-type", ""),
                                "text": base64.b64encode(f.response.content or b"").decode()
                            },
                            "redirectURL": "",
                            "headersSize": -1,
                            "bodySize": len(f.response.content or b"")
                        },
                        "cache": {},
                        "timings": {"send": 0, "wait": 0, "receive": 0}
                    }
                    har["log"]["entries"].append(entry)
                out = os.environ.get("HAR_OUT", "dump.har")
                with open(out, "w") as fh:
                    json.dump(har, fh)
                ctx.log.info("HAR written to " + out)
            EOF

            echo "Starting proxy recorder..."
            HAR_OUT=dump.har mitmdump -w dump.mitm -s har_dump.py &
            PROXY_PID=$!
            sleep 5
            
            echo "Installing fresh APK..."
            adb install app/build/outputs/apk/debug/app-debug.apk
            
            echo "Launching App..."
            adb shell monkey -p com.example.analyticsauditor -c android.intent.category.LAUNCHER 1
            
            echo "Waiting for app to auto-fire events..."
            sleep 15
            
            echo "Shutting down proxy..."
            kill $PROXY_PID
            sleep 2
            
            echo "Converting captured flows to HAR..."
            HAR_OUT=dump.har mitmdump -r dump.mitm -s har_dump.py -q || true
            
            echo "Files in workspace:"
            ls -la dump.har dump.mitm || true

      - name: Upload HAR File
        uses: actions/upload-artifact@v4
        with:
          name: network-log
          path: |
            dump.har
            dump.mitm
