name: Analytics Auditor PoC

on: 
  workflow_dispatch: # Allows manual trigger via the button

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 1: Set up Java environment to compile the app
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Step 2: Build the fresh APK right here using the system's pre-installed Gradle
      - name: Compile Debug APK
        run: gradle assembleDebug

      # Step 3: Install the proxy recorder
      - name: Install Network Proxy (mitmproxy)
        run: |
          sudo apt-get update
          sudo apt-get install mitmproxy -y

      # Step 4: Boot the phone and run the app
      - name: Boot Emulator and Run Audit
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -http-proxy http://127.0.0.1:8080
          script: |
            echo "Starting proxy recorder..."
            mitmdump -w dump.har &
            PROXY_PID=$!
            
            sleep 5
            
            echo "Installing fresh APK..."
            adb install app/build/outputs/apk/debug/app-debug.apk
            
            echo "Launching App..."
            adb shell monkey -p com.example.analyticsauditor -c android.intent.category.LAUNCHER 1
            
            echo "Waiting for app to auto-fire events..."
            sleep 15
            
            echo "Shutting down proxy..."
            kill $PROXY_PID

      # Step 5: Save the finished log file
      - name: Upload HAR File
        uses: actions/upload-artifact@v4
        with:
          name: network-log
          path: dump.har
