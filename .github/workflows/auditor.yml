name: Analytics Auditor PoC

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: "URL of an .apk or .apkm to audit. Leave blank to audit our own test app."
        type: string
        default: ""
      simulate_third_party:
        description: "Strip our network config (only affects our own test app)"
        type: boolean
        default: false
      journey_steps:
        description: "Journey: one step per line - e.g. 'tap Akceptuje' / 'type shoes' / 'wait 3'"
        type: string
        default: ""

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Only relevant when auditing our own app.
      - name: Simulate a third-party APK
        if: ${{ inputs.simulate_third_party && inputs.apk_url == '' }}
        run: |
          sed -i '/android:networkSecurityConfig/d' app/src/main/AndroidManifest.xml
          rm -f app/src/main/res/xml/network_security_config.xml
          echo "Network config stripped."

      # Skipped entirely when auditing someone else's app - it is already built.
      - name: Compile Debug APK
        if: ${{ inputs.apk_url == '' }}
        run: gradle assembleDebug

      # The APK never lives in the repo. It is fetched at run time from a URL,
      # which is how a real backend would hand a client's upload to a runner.
      - name: Fetch the app under test
        if: ${{ inputs.apk_url != '' }}
        run: |
          mkdir -p test-apks
          echo "Downloading: ${{ inputs.apk_url }}"
          curl -sSL --fail -o test-apks/target.bin "${{ inputs.apk_url }}" || {
            echo "ERROR: download failed. Is the URL public and direct?"; exit 1; }
          ls -la test-apks/
          file test-apks/target.bin
          echo "--- what is inside it ---"
          unzip -l test-apks/target.bin | head -30 || echo "(not a zip)"

      - name: Install Network Proxy and Prepare Certificate
        run: |
          sudo apt-get update
          sudo apt-get install mitmproxy -y

          mitmdump --quiet &
          timeout 20 bash -c 'while [ ! -f ~/.mitmproxy/mitmproxy-ca-cert.pem ]; do sleep 1; done'
          pkill mitmdump || true

          if [ ! -f ~/.mitmproxy/mitmproxy-ca-cert.pem ]; then
            echo "ERROR: certificate was never generated"; exit 1
          fi

          HASH=$(openssl x509 -inform PEM -subject_hash_old -in ~/.mitmproxy/mitmproxy-ca-cert.pem | head -1)
          cp ~/.mitmproxy/mitmproxy-ca-cert.pem ./$HASH.0
          echo "Certificate prepared as $HASH.0"

          cat > har_dump.py << 'EOF'
          """Turn captured mitmproxy flows into a HAR the auditor website can read."""
          import base64, datetime, json, os

          flows = []
          MAX_BODY = 512 * 1024

          def response(flow):
              flows.append(flow)

          def _body(raw, ctype):
              if not raw:
                  return None
              raw = raw[:MAX_BODY]
              try:
                  return {"mimeType": ctype, "text": raw.decode("utf-8")}
              except UnicodeDecodeError:
                  return {"mimeType": ctype,
                          "text": base64.b64encode(raw).decode(),
                          "encoding": "base64"}

          def done():
              har = {"log": {"version": "1.2",
                             "creator": {"name": "analytics-auditor", "version": "2.0"},
                             "entries": []}}
              for f in flows:
                  if f.response is None:
                      continue

                  start = f.request.timestamp_start or 0
                  end = f.response.timestamp_end or start
                  started = datetime.datetime.fromtimestamp(start, datetime.timezone.utc)

                  req = {
                      "method": f.request.method,
                      "url": f.request.pretty_url,
                      "httpVersion": f.request.http_version,
                      "cookies": [],
                      "headers": [{"name": k, "value": v} for k, v in f.request.headers.items()],
                      "queryString": [{"name": k, "value": v} for k, v in f.request.query.items()],
                      "headersSize": -1,
                      "bodySize": len(f.request.raw_content or b""),
                  }
                  pd = _body(f.request.raw_content, f.request.headers.get("content-type", ""))
                  if pd:
                      pd["params"] = []
                      req["postData"] = pd

                  resp_body = _body(f.response.raw_content, f.response.headers.get("content-type", ""))
                  res = {
                      "status": f.response.status_code,
                      "statusText": f.response.reason or "",
                      "httpVersion": f.response.http_version,
                      "cookies": [],
                      "headers": [{"name": k, "value": v} for k, v in f.response.headers.items()],
                      "content": resp_body or {"size": 0, "mimeType": "", "text": ""},
                      "redirectURL": "",
                      "headersSize": -1,
                      "bodySize": len(f.response.raw_content or b""),
                  }
                  res["content"]["size"] = len(f.response.raw_content or b"")

                  har["log"]["entries"].append({
                      "startedDateTime": started.isoformat().replace("+00:00", "Z"),
                      "time": round((end - start) * 1000, 2),
                      "request": req,
                      "response": res,
                      "cache": {},
                      "timings": {"send": 0, "wait": round((end - start) * 1000, 2), "receive": 0},
                  })

              out = os.environ.get("HAR_OUT", "dump.har")
              with open(out, "w") as fh:
                  json.dump(har, fh, indent=1)
              print("HAR written to %s with %d entries" % (out, len(har["log"]["entries"])))
          EOF
          echo "har_dump.py ready"

      # The emulator needs hardware acceleration. Without this the runner has no
      # access to /dev/kvm, the emulator falls back to pure software emulation,
      # takes 7+ minutes to boot and then dies. This grants the access.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm

      - name: Boot Emulator and Run Audit
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -http-proxy http://127.0.0.1:8080
          script: |
            JOURNEY_STEPS="${{ inputs.journey_steps }}" bash ./run_audit.sh

      - name: Summarise what was captured
        if: always()
        run: |
          python3 - << 'EOF'
          import json, collections, urllib.parse, os
          if not os.path.exists("dump.har"):
              print("No HAR was produced."); raise SystemExit(0)
          d = json.load(open("dump.har"))
          es = d["log"]["entries"]
          print("Captured %d requests\n" % len(es))

          VENDORS = {
            "app-measurement.com": "Firebase / GA4",
            "google-analytics.com": "GA4",
            "analytics.google.com": "GA4",
            "firebaseinstallations.googleapis.com": "Firebase",
            "adjust.com": "Adjust",
            "appsflyer.com": "AppsFlyer",
            "graph.facebook.com": "Meta",
            "amplitude.com": "Amplitude",
            "mixpanel.com": "Mixpanel",
            "branch.io": "Branch",
            "segment.io": "Segment",
            "analytics.tiktok.com": "TikTok",
            "omtrdc.net": "Adobe",
            "clevertap.com": "CleverTap",
          }
          hosts = collections.Counter(urllib.parse.urlparse(e["request"]["url"]).hostname or "?" for e in es)
          print("--- every host contacted ---")
          for h, n in hosts.most_common():
              tag = ""
              for suf, name in VENDORS.items():
                  if h == suf or h.endswith("." + suf): tag = "   <-- " + name
              print("  %3d  %s%s" % (n, h, tag))

          print("\n--- analytics vendors detected ---")
          found = set()
          for h in hosts:
              for suf, name in VENDORS.items():
                  if h == suf or h.endswith("." + suf): found.add(name)
          print("  " + (", ".join(sorted(found)) if found else "none"))

          fb = [e for e in es if "app-measurement" in (e["request"]["url"] or "")
                and e["request"]["method"] == "POST"]
          print("\nFirebase event uploads captured: %d" % len(fb))
          for e in fb:
              body = e["request"].get("postData", {})
              print("   POST %s  body=%d bytes  encoding=%s"
                    % (e["request"]["url"][:60], e["request"]["bodySize"], body.get("encoding", "text")))
          EOF

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: |
            dump.har
            dump.mitm
            firebase.log
            crash.log
            mitm.log
            screen-*.png
            ui.xml
