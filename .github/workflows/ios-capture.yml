name: iOS Capture Test

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: "URL of a .app.zip to audit. Leave blank to build and audit our own test app."
        type: string
        default: ""

jobs:
  capture:
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen and mitmproxy
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
        run: |
          brew install xcodegen mitmproxy
          mitmdump --version | head -2

      - name: Generate Xcode project
        if: ${{ inputs.app_url == '' }}
        run: xcodegen generate

      - name: Downgrade project format so Xcode can open it
        if: ${{ inputs.app_url == '' }}
        run: |
          sed -i '' 's/objectVersion = 77;/objectVersion = 56;/' AnalyticsAuditor.xcodeproj/project.pbxproj || true
          grep -m1 objectVersion AnalyticsAuditor.xcodeproj/project.pbxproj

      - name: Build the .app for the simulator
        if: ${{ inputs.app_url == '' }}
        run: |
          xcodebuild \
            -project AnalyticsAuditor.xcodeproj \
            -scheme AnalyticsAuditor \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath build \
            ARCHS="x86_64 arm64" ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
          echo "APP_PATH=$(find build -name '*.app' -type d | head -1)" >> "$GITHUB_ENV"

      # When an app_url is supplied we audit somebody else's build instead of ours.
      # The upload is a .zip containing a .app bundle (that is how iOS ships
      # simulator builds), so we unzip it and find the .app inside.
      - name: Fetch the app under test
        if: ${{ inputs.app_url != '' }}
        env:
          APP_URL: ${{ inputs.app_url }}
        run: |
          mkdir -p incoming
          echo "Downloading the uploaded app..."
          curl -fL "$APP_URL" -o incoming/app.zip
          ls -la incoming/
          unzip -o -q incoming/app.zip -d incoming/unpacked
          FOUND=$(find incoming/unpacked -maxdepth 3 -name "*.app" -type d | head -1)
          if [ -z "$FOUND" ]; then
            echo "############################################################"
            echo "No .app bundle found inside the upload. This is a RESULT."
            echo "iOS auditing needs a SIMULATOR build (.app zipped up)."
            echo "An .ipa from the App Store cannot be used: it is encrypted"
            echo "and built for real devices, so no simulator can run it."
            echo "Contents of the upload:"
            find incoming/unpacked -maxdepth 2 | head -30
            echo "############################################################"
            exit 1
          fi
          echo "Found app bundle: $FOUND"
          echo "APP_PATH=$FOUND" >> "$GITHUB_ENV"

      - name: Read the app's bundle id
        run: |
          # Every iOS app declares its own id. We read it from the bundle rather
          # than hardcoding, so any client's app can be launched.
          BID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Info.plist")
          echo "BUNDLE_ID=$BID" >> "$GITHUB_ENV"
          echo "Bundle id under test: $BID"

      - name: Write the HAR converter
        run: |
          cat > har_dump.py <<'PY'
          import base64, datetime, json, os
          flows = []
          MAX_BODY = 512 * 1024
          def response(flow):
              flows.append(flow)
          def _body(raw, ctype):
              if not raw: return None
              raw = raw[:MAX_BODY]
              try: return {"mimeType": ctype, "text": raw.decode("utf-8")}
              except UnicodeDecodeError:
                  return {"mimeType": ctype, "text": base64.b64encode(raw).decode(), "encoding": "base64"}
          def done():
              har = {"log": {"version": "1.2", "creator": {"name": "analytics-auditor", "version": "2.0"}, "entries": []}}
              for f in flows:
                  if f.response is None: continue
                  start = f.request.timestamp_start or 0
                  end = f.response.timestamp_end or start
                  started = datetime.datetime.fromtimestamp(start, datetime.timezone.utc)
                  req = {"method": f.request.method, "url": f.request.pretty_url,
                         "httpVersion": f.request.http_version, "cookies": [],
                         "headers": [{"name": k, "value": v} for k, v in f.request.headers.items()],
                         "queryString": [{"name": k, "value": v} for k, v in f.request.query.items()],
                         "headersSize": -1, "bodySize": len(f.request.raw_content or b"")}
                  pd = _body(f.request.raw_content, f.request.headers.get("content-type", ""))
                  if pd: pd["params"] = []; req["postData"] = pd
                  rb = _body(f.response.raw_content, f.response.headers.get("content-type", ""))
                  res = {"status": f.response.status_code, "statusText": f.response.reason or "",
                         "httpVersion": f.response.http_version, "cookies": [],
                         "headers": [{"name": k, "value": v} for k, v in f.response.headers.items()],
                         "content": rb or {"size": 0, "mimeType": "", "text": ""},
                         "redirectURL": "", "headersSize": -1, "bodySize": len(f.response.raw_content or b"")}
                  res["content"]["size"] = len(f.response.raw_content or b"")
                  har["log"]["entries"].append({"startedDateTime": started.isoformat().replace("+00:00", "Z"),
                      "time": round((end - start) * 1000, 2), "request": req, "response": res,
                      "cache": {}, "timings": {"send": 0, "wait": round((end - start) * 1000, 2), "receive": 0}})
              out = os.environ.get("HAR_OUT", "dump.har")
              json.dump(har, open(out, "w"), indent=1)
              print("HAR written to %s with %d entries" % (out, len(har["log"]["entries"])))
          PY
          echo "har_dump.py ready"

      - name: Generate the mitmproxy certificate
        run: |
          # macOS has no `timeout` command, so wait with a plain loop.
          mitmdump --quiet > /dev/null 2>&1 &
          MP=$!
          WAITED=0
          while [ ! -f "$HOME/.mitmproxy/mitmproxy-ca-cert.pem" ] && [ "$WAITED" -lt 30 ]; do
            sleep 1
            WAITED=$((WAITED + 1))
          done
          kill $MP 2>/dev/null || true
          if [ ! -f "$HOME/.mitmproxy/mitmproxy-ca-cert.pem" ]; then
            echo "ERROR: mitmproxy certificate was never created"
            exit 1
          fi
          ls -la "$HOME/.mitmproxy/"
          echo "Certificate generated after ${WAITED}s." 

      - name: Boot a simulator
        run: |
          UDID=$(xcrun simctl list devices available | grep -E "iPhone" | head -1 | grep -oE "[0-9A-Fa-f]{8}-([0-9A-Fa-f]{4}-){3}[0-9A-Fa-f]{12}")
          if [ -z "$UDID" ]; then
            RUNTIME=$(xcrun simctl list runtimes | grep -oE "com.apple.CoreSimulator.SimRuntime.iOS[^ ]*" | head -1)
            UDID=$(xcrun simctl create capturephone "iPhone 15" "$RUNTIME")
          fi
          echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
          echo "Booted $UDID"

      - name: Trust the mitmproxy certificate inside the simulator
        run: |
          xcrun simctl keychain "$SIM_UDID" add-root-cert ~/.mitmproxy/mitmproxy-ca-cert.pem
          echo "Certificate trusted in the simulator."

      - name: Route the Mac's network through mitmproxy
        run: |
          networksetup -listallnetworkservices
          SVC=$(networksetup -listallnetworkservices | tail -n +2 | grep -v '\*' | head -1)
          if [ -z "$SVC" ]; then SVC="Wi-Fi"; fi
          echo "NET_SVC=$SVC" >> "$GITHUB_ENV"

          # IMPORTANT: this proxy is system-wide on the runner, so it would also
          # capture the Actions runner's own connection back to GitHub. mitmproxy
          # presents an untrusted certificate to it, the runner loses contact, and
          # GitHub cancels the job as a lost runner. Bypassing GitHub's own hosts
          # keeps the runner talking to GitHub directly while the simulator's app
          # traffic still goes through us.
          sudo networksetup -setproxybypassdomains "$SVC" \
            "*.github.com" "github.com" \
            "*.githubusercontent.com" "githubusercontent.com" \
            "*.actions.githubusercontent.com" \
            "*.blob.core.windows.net" "*.azureedge.net" "*.windows.net" \
            "localhost" "127.0.0.1" "169.254.169.254" "*.local"

          sudo networksetup -setwebproxy "$SVC" 127.0.0.1 8080
          sudo networksetup -setsecurewebproxy "$SVC" 127.0.0.1 8080
          echo "System proxy set on '$SVC', with GitHub's own hosts bypassed."
          networksetup -getproxybypassdomains "$SVC"

      - name: Record, install, launch, capture
        run: |
          HAR_OUT=dump.har mitmdump -w dump.mitm -s har_dump.py > mitm.log 2>&1 &
          echo $! > proxy.pid
          sleep 4
          echo "Installing $APP_PATH"
          xcrun simctl install "$SIM_UDID" "$APP_PATH"
          # Watch what the app itself says. Firebase is chatty when debug logging is
          # on, so this tells us whether the SDK started, whether debug mode took,
          # and whether it decided to upload. Without this we are guessing.
          xcrun simctl spawn "$SIM_UDID" log stream --level debug \
            --predicate 'eventMessage CONTAINS[c] "firebase" OR eventMessage CONTAINS[c] "FIRAnalytics" OR eventMessage CONTAINS[c] "app-measurement" OR subsystem CONTAINS "com.google"' \
            > firebase-console.log 2>&1 &
          echo $! > logstream.pid
          sleep 2

          # These flags make the Firebase SDK upload within seconds instead of
          # batching for up to an hour, and make it log verbosely. On iOS this is a
          # LAUNCH ARGUMENT, so no root or jailbreak is needed: we control the launch.
          # Harmless for apps that do not use Firebase.
          xcrun simctl launch "$SIM_UDID" "$BUNDLE_ID" \
            -FIRDebugEnabled -FIRAnalyticsDebugEnabled -FIRAnalyticsVerboseLoggingEnabled || {
            echo "Launch failed. Bundle ids present on device:"
            xcrun simctl listapps "$SIM_UDID" | grep -i bundleid || true
            exit 1
          }
          echo "App launched. Letting it fire and settle..."
          sleep 40

          # Firebase flushes when the app goes to the background. There is no home
          # button on a headless simulator, so we push our app back by opening
          # another one. This is the iOS equivalent of the HOME keypress we send
          # on Android before waiting for the SDK to upload.
          echo "Backgrounding the app to trigger a flush..."
          xcrun simctl launch "$SIM_UDID" com.apple.mobilesafari > /dev/null 2>&1 || true
          sleep 45
          xcrun simctl io "$SIM_UDID" screenshot screen.png || true
          echo "Stopping the recorder."
          kill "$(cat logstream.pid)" 2>/dev/null || true
          kill "$(cat proxy.pid)" 2>/dev/null || true
          sleep 3
          # Convert the raw recording into a HAR. Runs even if the flow above was odd.
          HAR_OUT=dump.har mitmdump -r dump.mitm -s har_dump.py -q || true
          ls -la dump.mitm dump.har 2>/dev/null || true

      - name: Turn the Mac proxy back off
        if: always()
        run: |
          if [ -n "$NET_SVC" ]; then
            sudo networksetup -setwebproxystate "$NET_SVC" off || true
            sudo networksetup -setsecurewebproxystate "$NET_SVC" off || true
            sudo networksetup -setproxybypassdomains "$NET_SVC" "Empty" || true
          fi

      - name: Summarise what was captured
        if: always()
        run: |
          # If the capture step was cut short, dump.mitm may exist without dump.har.
          if [ ! -f dump.har ] && [ -f dump.mitm ]; then
            echo "Recovering HAR from the raw recording..."
            pkill mitmdump 2>/dev/null || true
            sleep 2
            HAR_OUT=dump.har mitmdump -r dump.mitm -s har_dump.py -q || true
          fi
          if [ ! -f dump.har ]; then echo "No HAR produced."; exit 0; fi
          python3 - <<'PY'
          import json, collections, urllib.parse, os
          d = json.load(open("dump.har")); es = d["log"]["entries"]
          print("Captured", len(es), "requests")
          print("Bundle under test:", os.environ.get("BUNDLE_ID", "(ours)"))
          h = collections.Counter(urllib.parse.urlparse(e["request"]["url"]).hostname or "?" for e in es)
          for host, n in h.most_common(20): print("  %3d  %s" % (n, host))
          ga = [e for e in es if "google-analytics.com/g/collect" in e["request"]["url"]]
          print("\nGA4 g/collect hits (control sample):", len(ga))
          for e in ga: print("   ", e["request"]["url"][:90])

          fb = [e for e in es if "app-measurement.com" in e["request"]["url"]]
          posts = [e for e in fb if e["request"]["method"] == "POST"]
          print("\napp-measurement.com entries:", len(fb), " of which POSTs:", len(posts))
          for e in fb:
              pd = e["request"].get("postData", {})
              print("   %-4s %-58s body=%sB enc=%s" % (
                  e["request"]["method"], e["request"]["url"][:58],
                  e["request"].get("bodySize"), pd.get("encoding", "text")))
          if not posts:
              print("\n   No Firebase upload captured. If the control GA4 hits above are")
              print("   present, the capture works and the issue is Firebase-specific.")
          PY

      - name: What the Firebase SDK said
        if: always()
        run: |
          if [ ! -s firebase-console.log ]; then
            echo "No Firebase log lines were captured at all."
            echo "That usually means the SDK never started (check GoogleService-Info.plist is in the app bundle)."
            exit 0
          fi
          echo "--- lines mentioning debug mode / upload / collection ---"
          grep -iE "debug|upload|collection|disabled|enabled|measurement" firebase-console.log | head -40 || true
          echo
          echo "--- first 30 Firebase lines ---"
          head -30 firebase-console.log

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-capture
          path: |
            dump.har
            dump.mitm
            screen.png
            mitm.log
            firebase-console.log
