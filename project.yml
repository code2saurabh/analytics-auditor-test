name: AnalyticsAuditor
options:
  bundleIdPrefix: com.example
  compatibilityVersion: "14.0"
  deploymentTarget:
    iOS: "15.0"

# Firebase ships as a Swift Package. XcodeGen fetches it during the build.
# PINNED to the 10.x line on purpose: newer Firebase (11.x+) is written in
# Swift 6 and needs Xcode 16, but GitHub's macos-14 runner has Xcode 15.4.
# Unpinning this brings back "cannot find type 'sending' in scope" errors.
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    majorVersion: 10.29.0

targets:
  AnalyticsAuditor:
    type: application
    platform: iOS
    sources: [Sources]
    dependencies:
      - package: Firebase
        product: FirebaseAnalytics
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Auditor iOS
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        # Make sure analytics collection is on, regardless of console defaults.
        FIREBASE_ANALYTICS_COLLECTION_ENABLED: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.analyticsauditor.ios
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
schemes:
  AnalyticsAuditor:
    build:
      targets:
        AnalyticsAuditor: all
    run:
      config: Debug
